<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Desafio 3</title>
  </head>
  <body>
    <main>
      <!-- Hero -->
      <div class="container">
        <div class="hero">
          <p class="linha1">Your Result</p>
          <p class="linha2"><span>76</span>of 100</p>
          <p class="linha4">Great</p>
          <p class="linha5">
            You scored higher than 65% of the people who br have taken these
            tests.
          </p>
        </div>
        <!-- Status -->

        <div class="stats1">
          <p class="teste1">Summary</p>

          <p class="teste2">
            <img src="./assets/images/icon-reaction.svg" alt="" />Reaction

            <span class="end">
              <span class="preto">80</span><span class="cinza">/100</span></span
            >
          </p>

          <p class="teste3">
            <img src="./assets/images/icon-memory.svg" alt="" />Memory

            <span class="end">
              <span class="preto">92</span><span class="cinza">/100</span></span
            >
          </p>

          <p class="teste4">
            <img src="./assets/images/icon-verbal.svg" alt="" />Verbal

            <span class="end">
              <span class="preto">61</span><span class="cinza">/100</span></span
            >
          </p>
          <p class="teste5">
            <img src="./assets/images/icon-visual.svg" alt="" />Visual

            <span class="end">
              <span class="preto">72</span><span class="cinza">/100</span></span
            >
          </p>
          <p class="botao">Continue</p>
        </div>
      </div>
    </main>
  </body>
</html>
